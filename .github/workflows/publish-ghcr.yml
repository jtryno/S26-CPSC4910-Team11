name: Publish Docker images to GHCR and deploy to EC2

on:
  push:
    branches: [ "main", "justin-reworks" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: driver-incentive-program
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image vars
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
          echo "REPO_LC=${REPO,,}" >> $GITHUB_ENV

      - name: Build and push API
        run: |
          IMAGE="ghcr.io/$OWNER_LC/$REPO_LC-api:latest"
          docker buildx build --platform linux/amd64 -f server/Dockerfile -t "$IMAGE" --push .

      - name: Build and push WEB
        run: |
          IMAGE="ghcr.io/$OWNER_LC/$REPO_LC-web:latest"
          docker buildx build --platform linux/amd64 -f Dockerfile -t "$IMAGE" --push .

        
      - name: Run deploy commands on EC2
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              \"echo '${{ secrets.GHCR_PAT }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin\",
              \"cd /home/ubuntu/S26-CPSC4910-Team11/driver-incentive-program/\",
              \"docker compose pull\",
              \"docker compose up -d\",
              \"docker system prune -af || true\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StandardOutputContent" \
            --output text