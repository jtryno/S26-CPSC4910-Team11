services:
  api:
    image: ghcr.io/jtryno/s26-cpsc4910-team11-api:latest
    environment:
      PORT: "5000"
      DB_HOST: "${DB_HOST}"
      DB_USER: "${DB_USER}"
      DB_PASS: "${DB_PASS}"
      DB_NAME: "${DB_NAME}"
      DB_PORT: "${DB_PORT:-3306}"
      DB_SSL: "${DB_SSL:-false}"
      DB_SSL_CA: "${DB_SSL_CA:-}"
      DB_SSL_CA_PATH: "${DB_SSL_CA_PATH:-}"
      DB_SSL_REJECT_UNAUTHORIZED: "${DB_SSL_REJECT_UNAUTHORIZED:-true}"
      EBAY_CLIENT_ID: "${EBAY_CLIENT_ID}"
      EBAY_CLIENT_SECRET: "${EBAY_CLIENT_SECRET}"
      RESEND_API_KEY: "${RESEND_API_KEY}"
      RESEND_FROM: "${RESEND_FROM:-Good Driver <onboarding@resend.dev>}"
      APP_BASE_URL: "${APP_BASE_URL:-http://localhost}"
    expose:
      - "5000"
    restart: unless-stopped

  web:
    image: ghcr.io/jtryno/s26-cpsc4910-team11-web:latest
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped
